<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pete's Pizza Delivery</title>
</head>

<body>

    <center>
        <h1>Pete's Pizza Delivery</h1>
        <h2>Online Order Form</h2>
        <h3>*Required Fields</h3>
    </center>

    <form>

        <fieldset>
            <legend>Customer Details Information</legend>

            <label for="fullName">*Name:</label>
            <input type="text" id="fullName" required>
            <br><br>

            <label for="address">*Address:</label>
            <input type="text" id="address" size="50" required>
            <br><br>

            <label for="city">*Town/City:</label>
            <input type="text" id="city" size="30" required>
            <br><br>

            <label for="postcode">*Postcode:</label>
            <input type="text" id="postcode" size="8" required>
            <br><br>

            <label for="phone">*Tel:</label>
            <input type="tel" id="phone" required>
            <br><br>

            <label for="email">*Email:</label>
            <input type="email" id="email" required>

        </fieldset>

        <br>

        <table width="100%">
            <tr>

                <td>
                    <fieldset>
                        <legend>Topping</legend>

                        <input type="radio" name="topping"> Margherita <br>
                        <input type="radio" name="topping"> Four Seasons <br>
                        <input type="radio" name="topping"> Meat Feast

                    </fieldset>
                </td>

                <td>
                    <fieldset>
                        <legend>Size</legend>

                        <input type="radio" name="size"> Small <br>
                        <input type="radio" name="size"> Medium <br>
                        <input type="radio" name="size"> Large

                    </fieldset>
                </td>

                <td>
                    <fieldset>
                        <legend>Extras</legend>

                        <input type="checkbox" name="extras"> Mushrooms <br>
                        <input type="checkbox" name="extras"> Green Peppers <br>
                        <input type="checkbox" name="extras"> Anchovies <br>
                        <input type="checkbox" name="extras"> Extra Cheese

                    </fieldset>
                </td>

            </tr>
        </table>

        <br>

        <fieldset>
            <legend>Delivery</legend>

            Preferred delivery time:
            <input type="time">

            <br><br>

            Delivery Instructions:

            <br><br>

            <textarea rows="5" cols="150"></textarea>

        </fieldset>

        <br>

        <center>
            <input type="submit" value="Submit Order">
        </center>

    </form>

</body>

</html>
